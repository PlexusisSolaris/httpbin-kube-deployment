apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}-svc
  namespace: {{ .Values.service.namespace }}
  labels:
    run: {{ .Values.service.name }}
spec:
  ports:
    - port: {{ .Values.service.port }}
      name: http
      protocol: TCP
      targetPort: {{ .Values.service.port }}
  selector:
    run: {{ .Values.service.name }}
